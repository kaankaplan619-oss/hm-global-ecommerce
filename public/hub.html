  <style>
    :root{
      --bg:#f6f4f9;
      --card:#ffffff;
      --line:#e6e8ee;
      --text:#3f2d58;
      --text-soft:#6e6280;
      --pink:#b13f74;
      --teal:#1fb2a5;
      --shadow:0 18px 40px -22px rgba(63,45,88,.45);
      --radius:20px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100dvh;
      font-family:-apple-system,BlinkMacSystemFont,"Avenir Next","Segoe UI","Helvetica Neue",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 520px at 50% -10%, rgba(177,63,116,.10), transparent 60%),
        radial-gradient(900px 480px at 50% 115%, rgba(31,178,165,.12), transparent 60%),
        var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:36px 20px calc(30px + env(safe-area-inset-bottom));
      -webkit-font-smoothing:antialiased;
    }
    .wrap{width:100%;max-width:480px}

    header{text-align:center;margin-bottom:28px}
    .kicker{
      font-size:11px;letter-spacing:.26em;text-transform:uppercase;
      color:var(--text-soft);font-weight:600;margin:0 0 10px;opacity:.85;
    }
    h1{
      font-size:clamp(25px,6.5vw,31px);line-height:1.12;margin:0;
      font-weight:600;letter-spacing:-.015em;
    }

    .cards{display:flex;flex-direction:column;gap:16px}
    .card{
      position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      padding:30px 22px 26px;text-decoration:none;overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px}
    .card--print::before{background:linear-gradient(90deg,#b13f74,#d15891)}
    .card--clean::before{background:linear-gradient(90deg,#2b73a6,#1fb2a5)}
    .card:hover,.card:focus-visible{
      transform:translateY(-3px);
      box-shadow:0 26px 52px -24px rgba(63,45,88,.55);outline:none;
    }
    .card--print:hover,.card--print:focus-visible{border-color:var(--pink)}
    .card--clean:hover,.card--clean:focus-visible{border-color:var(--teal)}

    .brandlogo{display:block;height:58px;width:auto;max-width:78%;object-fit:contain}
    .cap{
      display:inline-flex;align-items:center;gap:8px;
      font-size:13.5px;font-weight:600;letter-spacing:.005em;
      padding:10px 18px;border-radius:999px;
      transition:background .18s ease, color .18s ease;
    }
    .cap svg{width:15px;height:15px;transition:transform .18s ease}
    .card:hover .cap svg{transform:translateX(4px)}
    .card--print .cap{color:var(--pink);background:rgba(177,63,116,.09)}
    .card--clean .cap{color:#15897e;background:rgba(31,178,165,.12)}
    .card--print:hover .cap,.card--print:active .cap{background:var(--pink);color:#fff}
    .card--clean:hover .cap,.card--clean:active .cap{background:#15897e;color:#fff}

    footer{text-align:center;margin-top:24px;color:var(--text-soft);font-size:12px;letter-spacing:.02em}
  </style>
</head>
